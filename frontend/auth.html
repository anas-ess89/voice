<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceID - Authentification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #05080f 0%, #0a0f1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        .auth-card {
            background: #0e1525;
            border: 1px solid rgba(180, 255, 71, 0.15);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-header h1 {
            font-size: 2.5rem;
            color: #b4ff47;
            letter-spacing: -0.03em;
        }
        .auth-header p {
            color: #7a90b0;
            margin-top: 8px;
        }
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(180, 255, 71, 0.15);
            padding-bottom: 10px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: #7a90b0;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 8px;
        }
        .tab-btn.active {
            background: rgba(180, 255, 71, 0.1);
            color: #b4ff47;
        }
        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #7a90b0;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #1c2840;
            border: 1px solid rgba(180, 255, 71, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #b4ff47;
            box-shadow: 0 0 0 3px rgba(180, 255, 71, 0.1);
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #b4ff47;
            border: none;
            border-radius: 10px;
            color: #05080f;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background: #c8ff5c;
            transform: translateY(-2px);
        }
        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid rgba(180, 255, 71, 0.3);
            border-radius: 10px;
            color: #b4ff47;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .btn-secondary:hover {
            background: rgba(180, 255, 71, 0.1);
        }
        .error-message {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255, 51, 85, 0.1);
            border: 1px solid rgba(255, 51, 85, 0.3);
            border-radius: 8px;
            color: #ff3355;
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        .success-message {
            margin-top: 15px;
            padding: 10px;
            background: rgba(180, 255, 71, 0.1);
            border: 1px solid rgba(180, 255, 71, 0.3);
            border-radius: 8px;
            color: #b4ff47;
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }
        .success-message.show {
            display: block;
        }
        .forgot-link {
            text-align: center;
            margin-top: 15px;
        }
        .forgot-link a {
            color: #7a90b0;
            font-size: 0.85rem;
            text-decoration: none;
            cursor: pointer;
        }
        .forgot-link a:hover {
            color: #b4ff47;
            text-decoration: underline;
        }
        .back-link {
            text-align: center;
            margin-top: 15px;
        }
        .back-link a {
            color: #7a90b0;
            font-size: 0.85rem;
            text-decoration: none;
            cursor: pointer;
        }
        .back-link a:hover {
            color: #b4ff47;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>🎤 VoiceID</h1>
                <p>Système de Reconnaissance Vocale</p>
            </div>
            
            <!-- Tabs -->
            <div class="auth-tabs" id="auth-tabs">
                <button class="tab-btn active" data-tab="login">Connexion</button>
                <button class="tab-btn" data-tab="signup">Inscription</button>
            </div>
            
            <!-- Login Form -->
            <div id="login-form" class="auth-form active">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="votre@email.com">
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="login-password" placeholder="••••••••">
                </div>
                <button class="btn-primary" onclick="handleLogin()">Se connecter</button>
                <div class="forgot-link">
                    <a onclick="showForgotPassword()">🔐 Mot de passe oublié ?</a>
                </div>
                <div id="login-error" class="error-message"></div>
            </div>
            
            <!-- Forgot Password Form -->
            <div id="forgot-form" class="auth-form">
                <div class="form-group">
                    <label>Votre adresse email</label>
                    <input type="email" id="forgot-email" placeholder="votre@email.com">
                </div>
                <button class="btn-primary" onclick="handleForgotPassword()">📧 Envoyer le lien de réinitialisation</button>
                <div class="back-link">
                    <a onclick="backToLogin()">← Retour à la connexion</a>
                </div>
                <div id="forgot-error" class="error-message"></div>
                <div id="forgot-success" class="success-message"></div>
            </div>
            
            <!-- Signup Form -->
            <div id="signup-form" class="auth-form">
                <div class="form-group">
                    <label>Nom d'utilisateur</label>
                    <input type="text" id="signup-username" placeholder="ex: JeanDupont">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signup-email" placeholder="votre@email.com">
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="signup-password" placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label>Confirmer mot de passe</label>
                    <input type="password" id="signup-confirm" placeholder="••••••••">
                </div>
                <button class="btn-primary" onclick="handleSignup()">S'inscrire</button>
                <div id="signup-error" class="error-message"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        
        // Gestion des tabs
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
                document.getElementById(`${btn.dataset.tab}-form`).classList.add('active');
            });
        });
        
        // Afficher formulaire mot de passe oublié
        function showForgotPassword() {
            document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
            document.getElementById('forgot-form').classList.add('active');
            document.getElementById('auth-tabs').style.display = 'none';
        }
        
        // Retour à la connexion
        function backToLogin() {
            document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
            document.getElementById('login-form').classList.add('active');
            document.getElementById('auth-tabs').style.display = 'flex';
            document.getElementById('forgot-error').classList.remove('show');
            document.getElementById('forgot-success').classList.remove('show');
            document.getElementById('forgot-email').value = '';
        }
        
        // Connexion
        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            
            if (!email || !password) {
                errorEl.textContent = 'Veuillez remplir tous les champs';
                errorEl.classList.add('show');
                return;
            }
            
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('voice_user', JSON.stringify(data));
                    window.location.href = '/';
                } else {
                    errorEl.textContent = data.message || 'Email ou mot de passe incorrect';
                    errorEl.classList.add('show');
                }
            } catch (err) {
                errorEl.textContent = 'Erreur de connexion au serveur';
                errorEl.classList.add('show');
            }
        }
        
        // Mot de passe oublié
        async function handleForgotPassword() {
            const email = document.getElementById('forgot-email').value;
            const errorEl = document.getElementById('forgot-error');
            const successEl = document.getElementById('forgot-success');
            
            if (!email) {
                errorEl.textContent = 'Veuillez entrer votre email';
                errorEl.classList.add('show');
                successEl.classList.remove('show');
                return;
            }
            
            try {
                const res = await fetch(`${API_URL}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                
                if (data.success) {
                    errorEl.classList.remove('show');
                    successEl.textContent = '📧 Un email vous a été envoyé avec les instructions pour réinitialiser votre mot de passe.';
                    successEl.classList.add('show');
                    document.getElementById('forgot-email').value = '';
                    
                    // Rediriger vers login après 5 secondes
                    setTimeout(() => {
                        backToLogin();
                    }, 5000);
                } else {
                    successEl.classList.remove('show');
                    errorEl.textContent = data.message || 'Une erreur est survenue';
                    errorEl.classList.add('show');
                }
            } catch (err) {
                errorEl.textContent = 'Erreur de connexion au serveur';
                errorEl.classList.add('show');
            }
        }
        
        // Inscription
        async function handleSignup() {
            const username = document.getElementById('signup-username').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;
            const errorEl = document.getElementById('signup-error');
            
            if (!username || !email || !password) {
                errorEl.textContent = 'Veuillez remplir tous les champs';
                errorEl.classList.add('show');
                return;
            }
            
            if (password !== confirm) {
                errorEl.textContent = 'Les mots de passe ne correspondent pas';
                errorEl.classList.add('show');
                return;
            }
            
            if (password.length < 6) {
                errorEl.textContent = 'Le mot de passe doit contenir au moins 6 caractères';
                errorEl.classList.add('show');
                return;
            }
            
            try {
                const res = await fetch(`${API_URL}/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, username })
                });
                const data = await res.json();
                
                if (data.success) {
                    alert('✅ Inscription réussie ! Un email de confirmation vous a été envoyé.\n\nVeuillez vérifier votre boîte mail et cliquer sur le lien pour activer votre compte.');
                    
                    // Vider les champs
                    document.getElementById('signup-username').value = '';
                    document.getElementById('signup-email').value = '';
                    document.getElementById('signup-password').value = '';
                    document.getElementById('signup-confirm').value = '';
                    
                    // Retourner à la connexion
                    document.querySelector('.tab-btn[data-tab="login"]').click();
                } else {
                    errorEl.textContent = data.message || 'Erreur lors de l\'inscription';
                    errorEl.classList.add('show');
                }
            } catch (err) {
                errorEl.textContent = 'Erreur de connexion au serveur';
                errorEl.classList.add('show');
            }
        }
        
        // Vérifier si déjà connecté
        async function checkAuth() {
            const user = localStorage.getItem('voice_user');
            if (user) {
                try {
                    const res = await fetch(`${API_URL}/auth/me`);
                    const data = await res.json();
                    if (data.authenticated) {
                        window.location.href = '/';
                    } else {
                        localStorage.removeItem('voice_user');
                    }
                } catch(e) {
                    console.log('Auth check failed');
                }
            }
        }
        
        // Vérifier l'état de connexion au chargement
        checkAuth();
        
        // Support Enter key
        document.getElementById('login-password')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleLogin();
        });
        document.getElementById('forgot-email')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleForgotPassword();
        });
        document.getElementById('signup-confirm')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleSignup();
        });
    </script>
</body>
</html>
